name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 👇 DOWNGRADED TO JAVA 8 (Required for older Gradle/Android versions) 👇
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      # 👇 DOWNGRADED TO GRADLE 6.5 (Matches compileSdkVersion 29) 👇
      - name: Generate Ancient Gradle Wrapper
        run: gradle wrapper --gradle-version 6.5


      # 👇 THIS STEP LISTS ALL TASKS TO HELP YOU DIAGNOSE IF IT FAILS AGAIN 👇
      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # 👇 TRY SUBMODULE BUILD IF ROOT BUILD FAILS 👇
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      # Flexible artifact upload that searches the entire directory tree for the APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app-apk
          path: "**/build/outputs/apk/**/*.apk"
