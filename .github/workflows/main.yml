name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Generate Fresh Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 👇 THIS STEP LISTS ALL TASKS TO HELP YOU DIAGNOSE IF IT FAILS AGAIN 👇
      - name: List Available Gradle Tasks
        run: ./gradlew tasks --all || true

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # 👇 TRY SUBMODULE BUILD IF ROOT BUILD FAILS 👇
      - name: Build Debug APK
        run: |
          if ./gradlew :app:assembleDebug; then
            echo "Successfully built via :app:assembleDebug"
          elif ./gradlew assembleDebug; then
            echo "Successfully built via assembleDebug"
          else
            echo "Standard android tasks failed. Attempting a blind build of all assemble tasks..."
            ./gradlew assemble
          fi

      # Flexible artifact upload that searches the entire directory tree for the APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app-apk
          path: "**/build/outputs/apk/**/*.apk"
