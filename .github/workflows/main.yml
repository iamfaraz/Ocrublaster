name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👇 THIS NEW STEP FIXES THE ERROR 👇
      - name: Bootstrap Gradle Wrapper
        run: jar cfe gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain -C . .
        continue-on-error: true 
        # If the jar already exists, we ignore errors and move on

      # Alternate fallback if the jar is completely missing and the above fails
      - name: Download fresh Gradle if needed
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper
          fi
        # Note: ubuntu-latest has a default gradle installed that can generate this

       Tar: Make Gradle Executable
      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app-apk
          path: app/build/outputs/apk/debug/*.apk
