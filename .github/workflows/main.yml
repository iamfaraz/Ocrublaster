name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 👇 DOWNGRADED TO JAVA 8 (Required for older Gradle/Android versions) 👇
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      # 👇 MANUALLY DOWNLOAD GRADLE 6.5 BYPASSING THE RUNNER'S SYSTEM GRADLE 👇
      - name: Install and Setup Gradle 6.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.5-bin.zip
          unzip -q gradle-6.5-bin.zip -d opt/
          echo "GRADLE_HOME=$GITHUB_WORKSPACE/opt/gradle-6.5" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/opt/gradle-6.5/bin" >> $GITHUB_PATH

      # Verify the version downgraded successfully
      - name: Check Gradle Version
        run: gradle -v

      # 👇 THIS FIXES THE PERMISSION DENIED ERROR 👇
      - name: Fix Permissions
        run: chmod +x gradlew || true

      # 👇 USING THE INSTALLED GRADLE DIRECTLY 👇
      - name: Build Debug APK
        run: gradle :app:assembleDebug

      # Flexible artifact upload that searches the entire directory tree for the APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app-apk
          path: "**/build/outputs/apk/**/*.apk"
